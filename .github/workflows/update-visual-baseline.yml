name: Update visual regression baseline

on:
  workflow_dispatch:

jobs:
  update_baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_APP_ID: dummy
          VITE_API_BASE_URL: http://localhost:3000

      - name: Generate visual baselines
        run: cd frontend && npm run test:visual:update

      - name: Upload visual baselines
        uses: actions/upload-artifact@v4
        with:
          name: playwright-baselines
          path: frontend/tests/snapshots/
          retention-days: 90
