name: Deploy to Firebase Hosting on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  lint_and_check:
    runs-on: ubuntu-latest
    outputs:
      fn_ut_icon:     ${{ steps.fmt.outputs.fn_ut_icon }}
      fn_ut_counts:   ${{ steps.fmt.outputs.fn_ut_counts }}
      fn_ut_url:      ${{ steps.fmt.outputs.fn_ut_url }}
      fn_cov_icon:    ${{ steps.fmt.outputs.fn_cov_icon }}
      fn_cov_percent: ${{ steps.fmt.outputs.fn_cov_percent }}
      fn_cov_url:     ${{ steps.fmt.outputs.fn_cov_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Functions lint (ESLint)
        run: cd functions && npm run lint

      - name: Functions type check (tsc)
        run: cd functions && npm run build

      - name: Functions unit tests with coverage (Jest)
        run: cd functions && npm run test:coverage 2>&1 | tee /tmp/jest-output.txt; exit ${PIPESTATUS[0]}

      - name: Setup GCS credentials
        if: always()
        env:
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY:  ${{ secrets.GCS_PRIVATE_KEY }}
        run: |
          python3 -c "
          import json, os
          creds = {
            'type': 'service_account',
            'project_id': 'akanmi-news-butler-ci',
            'client_email': os.environ['GCS_CLIENT_EMAIL'],
            'private_key': os.environ['GCS_PRIVATE_KEY'].replace('\\\\n', '\\n'),
            'token_uri': 'https://oauth2.googleapis.com/token'
          }
          with open('/tmp/gcs-key.json', 'w') as f:
            json.dump(creds, f)
          "
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-key.json" >> $GITHUB_ENV
          gcloud auth activate-service-account --key-file=/tmp/gcs-key.json

      - name: Upload Functions UT report to GCS
        if: always()
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          gsutil cp functions/reports/test-report.html \
            "gs://akanmi-news-butler-ci/functions/ut/${SHA}.html"

      - name: Upload Functions Coverage report to GCS
        if: always()
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          gsutil -m cp -r functions/coverage/. \
            "gs://akanmi-news-butler-ci/functions/coverage/${SHA}"

      - name: Create Functions UT check
        if: always()
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          CHECK_REPO: ${{ github.repository }}
          CHECK_SHA:  ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/jest-output.txt 2>/dev/null || echo "")
          PASSED=$(echo "$OUTPUT" | grep -P '^Tests:' | grep -oP '\d+ passed' | grep -oP '^\d+' || echo "")
          TOTAL=$(echo "$OUTPUT"  | grep -P '^Tests:' | grep -oP '\d+ total'  | grep -oP '^\d+' || echo "")
          URL="https://storage.googleapis.com/akanmi-news-butler-ci/functions/ut/${CHECK_SHA}.html"
          if [ -n "$PASSED" ] && [ -n "$TOTAL" ]; then
            TITLE="${PASSED}/${TOTAL}"
            [ "$PASSED" = "$TOTAL" ] && CONCLUSION="success" || CONCLUSION="failure"
          else
            TITLE="failed" CONCLUSION="failure"
          fi
          jq -n \
            --arg sha "$CHECK_SHA" --arg conclusion "$CONCLUSION" \
            --arg title "$TITLE"   --arg summary "[テストレポートを開く](${URL})" \
            '{name:"Functions UT",head_sha:$sha,status:"completed",
              conclusion:$conclusion,output:{title:$title,summary:$summary}}' \
            | gh api "repos/${CHECK_REPO}/check-runs" --method POST --input -

      - name: Create Functions Coverage check
        if: always()
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          CHECK_REPO: ${{ github.repository }}
          CHECK_SHA:  ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/jest-output.txt 2>/dev/null || echo "")
          LINES=$(echo "$OUTPUT" | awk -F'|' '/^All files/{gsub(/ /,"",$5); print $5}' \
            | grep -oP '\d+\.?\d*' | head -1)
          URL="https://storage.googleapis.com/akanmi-news-butler-ci/functions/coverage/${CHECK_SHA}/index.html"
          if [ -n "$LINES" ]; then
            TITLE="${LINES}% lines" CONCLUSION="success"
          else
            TITLE="failed" CONCLUSION="failure"
          fi
          jq -n \
            --arg sha "$CHECK_SHA" --arg conclusion "$CONCLUSION" \
            --arg title "$TITLE"   --arg summary "[カバレッジレポートを開く](${URL})" \
            '{name:"Functions Coverage",head_sha:$sha,status:"completed",
              conclusion:$conclusion,output:{title:$title,summary:$summary}}' \
            | gh api "repos/${CHECK_REPO}/check-runs" --method POST --input -

      - name: Format output lines
        id: fmt
        if: always()
        env:
          CHECK_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/jest-output.txt 2>/dev/null || echo "")
          PASSED=$(echo "$OUTPUT" | grep -P '^Tests:' | grep -oP '\d+ passed' | grep -oP '^\d+' || echo "?")
          TOTAL=$(echo "$OUTPUT"  | grep -P '^Tests:' | grep -oP '\d+ total'  | grep -oP '^\d+' || echo "?")
          LINES=$(echo "$OUTPUT"  | awk -F'|' '/^All files/{gsub(/ /,"",$5); print $5}' \
            | grep -oP '\d+\.?\d*' | head -1 || echo "?")

          [ "$PASSED" != "?" ] && [ "$PASSED" = "$TOTAL" ] && UT_ICON="✅" || UT_ICON="❌"
          [ "$LINES"  != "?" ] && COV_ICON="✅" || COV_ICON="❌"

          echo "fn_ut_icon=${UT_ICON}"   >> $GITHUB_OUTPUT
          echo "fn_ut_counts=${PASSED}/${TOTAL}" >> $GITHUB_OUTPUT
          echo "fn_ut_url=https://storage.googleapis.com/akanmi-news-butler-ci/functions/ut/${CHECK_SHA}.html" >> $GITHUB_OUTPUT
          echo "fn_cov_icon=${COV_ICON}" >> $GITHUB_OUTPUT
          echo "fn_cov_percent=${LINES}" >> $GITHUB_OUTPUT
          echo "fn_cov_url=https://storage.googleapis.com/akanmi-news-butler-ci/functions/coverage/${CHECK_SHA}/index.html" >> $GITHUB_OUTPUT

  frontend_check:
    runs-on: ubuntu-latest
    outputs:
      fe_ut_icon:     ${{ steps.fmt.outputs.fe_ut_icon }}
      fe_ut_counts:   ${{ steps.fmt.outputs.fe_ut_counts }}
      fe_ut_url:      ${{ steps.fmt.outputs.fe_ut_url }}
      fe_cov_icon:    ${{ steps.fmt.outputs.fe_cov_icon }}
      fe_cov_percent: ${{ steps.fmt.outputs.fe_cov_percent }}
      fe_cov_url:     ${{ steps.fmt.outputs.fe_cov_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend type check (svelte-check)
        run: cd frontend && npm run check

      - name: Frontend unit tests with coverage (Vitest)
        run: cd frontend && npm run test:coverage 2>&1 | tee /tmp/vitest-output.txt; exit ${PIPESTATUS[0]}

      - name: Setup GCS credentials
        if: always()
        env:
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY:  ${{ secrets.GCS_PRIVATE_KEY }}
        run: |
          python3 -c "
          import json, os
          creds = {
            'type': 'service_account',
            'project_id': 'akanmi-news-butler-ci',
            'client_email': os.environ['GCS_CLIENT_EMAIL'],
            'private_key': os.environ['GCS_PRIVATE_KEY'].replace('\\\\n', '\\n'),
            'token_uri': 'https://oauth2.googleapis.com/token'
          }
          with open('/tmp/gcs-key.json', 'w') as f:
            json.dump(creds, f)
          "
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-key.json" >> $GITHUB_ENV
          gcloud auth activate-service-account --key-file=/tmp/gcs-key.json

      - name: Upload Frontend UT report to GCS
        if: always()
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          gsutil -m cp -r frontend/html/. \
            "gs://akanmi-news-butler-ci/frontend/ut/${SHA}"

      - name: Upload Frontend Coverage report to GCS
        if: always()
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          gsutil -m cp -r frontend/coverage/. \
            "gs://akanmi-news-butler-ci/frontend/coverage/${SHA}"

      - name: Create Frontend UT check
        if: always()
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          CHECK_REPO: ${{ github.repository }}
          CHECK_SHA:  ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/vitest-output.txt 2>/dev/null | sed 's/\x1b\[[0-9;]*m//g' || echo "")
          PASSED=$(echo "$OUTPUT" | grep -oP '^\s*Tests\s+\K\d+(?= passed)' | head -1 || echo "")
          TOTAL=$(echo "$OUTPUT"  | grep -oP '^\s*Tests\s+.*\(\K\d+(?=\))'  | head -1 || echo "")
          URL="https://storage.googleapis.com/akanmi-news-butler-ci/frontend/ut/${CHECK_SHA}/index.html"
          if [ -n "$PASSED" ] && [ -n "$TOTAL" ]; then
            TITLE="${PASSED}/${TOTAL}"
            [ "$PASSED" = "$TOTAL" ] && CONCLUSION="success" || CONCLUSION="failure"
          else
            TITLE="failed" CONCLUSION="failure"
          fi
          jq -n \
            --arg sha "$CHECK_SHA" --arg conclusion "$CONCLUSION" \
            --arg title "$TITLE"   --arg summary "[テストレポートを開く](${URL})" \
            '{name:"Frontend UT",head_sha:$sha,status:"completed",
              conclusion:$conclusion,output:{title:$title,summary:$summary}}' \
            | gh api "repos/${CHECK_REPO}/check-runs" --method POST --input -

      - name: Create Frontend Coverage check
        if: always()
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          CHECK_REPO: ${{ github.repository }}
          CHECK_SHA:  ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/vitest-output.txt 2>/dev/null | sed 's/\x1b\[[0-9;]*m//g' || echo "")
          LINES=$(echo "$OUTPUT" | awk -F'|' '/^All files/{gsub(/ /,"",$5); print $5}' \
            | grep -oP '\d+\.?\d*' | head -1)
          URL="https://storage.googleapis.com/akanmi-news-butler-ci/frontend/coverage/${CHECK_SHA}/index.html"
          if [ -n "$LINES" ]; then
            TITLE="${LINES}% lines" CONCLUSION="success"
          else
            TITLE="failed" CONCLUSION="failure"
          fi
          jq -n \
            --arg sha "$CHECK_SHA" --arg conclusion "$CONCLUSION" \
            --arg title "$TITLE"   --arg summary "[カバレッジレポートを開く](${URL})" \
            '{name:"Frontend Coverage",head_sha:$sha,status:"completed",
              conclusion:$conclusion,output:{title:$title,summary:$summary}}' \
            | gh api "repos/${CHECK_REPO}/check-runs" --method POST --input -

      - name: Format output lines
        id: fmt
        if: always()
        env:
          CHECK_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/vitest-output.txt 2>/dev/null | sed 's/\x1b\[[0-9;]*m//g' || echo "")
          PASSED=$(echo "$OUTPUT" | grep -oP '^\s*Tests\s+\K\d+(?= passed)' | head -1 || echo "?")
          TOTAL=$(echo "$OUTPUT"  | grep -oP '^\s*Tests\s+.*\(\K\d+(?=\))'  | head -1 || echo "?")
          LINES=$(echo "$OUTPUT"  | awk -F'|' '/^All files/{gsub(/ /,"",$5); print $5}' \
            | grep -oP '\d+\.?\d*' | head -1 || echo "?")

          [ "$PASSED" != "?" ] && [ "$PASSED" = "$TOTAL" ] && UT_ICON="✅" || UT_ICON="❌"
          [ "$LINES"  != "?" ] && COV_ICON="✅" || COV_ICON="❌"

          echo "fe_ut_icon=${UT_ICON}"   >> $GITHUB_OUTPUT
          echo "fe_ut_counts=${PASSED}/${TOTAL}" >> $GITHUB_OUTPUT
          echo "fe_ut_url=https://storage.googleapis.com/akanmi-news-butler-ci/frontend/ut/${CHECK_SHA}/index.html" >> $GITHUB_OUTPUT
          echo "fe_cov_icon=${COV_ICON}" >> $GITHUB_OUTPUT
          echo "fe_cov_percent=${LINES}" >> $GITHUB_OUTPUT
          echo "fe_cov_url=https://storage.googleapis.com/akanmi-news-butler-ci/frontend/coverage/${CHECK_SHA}/index.html" >> $GITHUB_OUTPUT

  visual_regression:
    runs-on: ubuntu-latest
    outputs:
      vrt_icon:   ${{ steps.format_vrt.outputs.vrt_icon }}
      vrt_counts: ${{ steps.format_vrt.outputs.vrt_counts }}
      vrt_url:    ${{ steps.format_vrt.outputs.vrt_url }}
      e2e_icon:   ${{ steps.format_e2e.outputs.e2e_icon }}
      e2e_counts: ${{ steps.format_e2e.outputs.e2e_counts }}
      e2e_url:    ${{ steps.format_e2e.outputs.e2e_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium webkit --with-deps

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_FIREBASE_API_KEY:      dummy
          VITE_FIREBASE_AUTH_DOMAIN:  dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:   dummy
          VITE_FIREBASE_APP_ID:       dummy
          VITE_API_BASE_URL:          http://localhost:3000
          VITE_VRT_AUTH_BYPASS:       true

      - name: Run Playwright (capture screenshots)
        run: cd frontend && npm run test:visual

      - name: Run e2e tests
        id: e2e
        run: |
          cd frontend
          npm run test:e2e 2>&1 | tee /tmp/e2e-output.txt
          exit ${PIPESTATUS[0]}

      - name: Format e2e report line
        id: format_e2e
        if: always()
        env:
          CHECK_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/e2e-output.txt 2>/dev/null \
            | sed 's/\x1b\[[0-9;]*m//g' || echo "")
          PASSED=$(echo "$OUTPUT" | grep -oP '\d+(?= passed)' | head -1 || echo "")
          FAILED=$(echo "$OUTPUT" | grep -oP '\d+(?= failed)' | head -1 || echo "0")
          FAILED=${FAILED:-0}
          if [ -n "$PASSED" ]; then
            TOTAL=$((PASSED + FAILED))
            COUNTS="${PASSED}/${TOTAL}"
            [ "$FAILED" != "0" ] && ICON="❌" || ICON="✅"
          else
            COUNTS="failed" ICON="❌"
          fi
          URL="https://storage.googleapis.com/akanmi-news-butler-ci/frontend/e2e/${CHECK_SHA}/index.html"
          echo "e2e_icon=${ICON}"     >> $GITHUB_OUTPUT
          echo "e2e_counts=${COUNTS}" >> $GITHUB_OUTPUT
          echo "e2e_url=${URL}"       >> $GITHUB_OUTPUT

      - name: Setup GCS credentials
        if: always()
        env:
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY:  ${{ secrets.GCS_PRIVATE_KEY }}
        run: |
          python3 -c "
          import json, os
          creds = {
            'type': 'service_account',
            'project_id': 'akanmi-news-butler-ci',
            'client_email': os.environ['GCS_CLIENT_EMAIL'],
            'private_key': os.environ['GCS_PRIVATE_KEY'].replace('\\\\n', '\\n'),
            'token_uri': 'https://oauth2.googleapis.com/token'
          }
          with open('/tmp/gcs-key.json', 'w') as f:
            json.dump(creds, f)
          "
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-key.json" >> $GITHUB_ENV
          gcloud auth activate-service-account --key-file=/tmp/gcs-key.json

      - name: Upload E2E report to GCS
        if: always()
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          gsutil -m cp -r frontend/playwright-report/. \
            "gs://akanmi-news-butler-ci/frontend/e2e/${SHA}"

      - name: Run reg-suit (compare & publish)
        run: |
          cd frontend
          npx reg-suit run 2>&1 | tee /tmp/reg-suit-output.txt
          exit ${PIPESTATUS[0]}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create VRT check
        if: always()
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          CHECK_REPO: ${{ github.repository }}
          CHECK_SHA:  ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/reg-suit-output.txt 2>/dev/null || echo "")
          CHANGED=$(echo "$OUTPUT" | grep -oP 'Changed items: \K\d+' | head -1 || echo "0")
          NEW=$(echo "$OUTPUT"     | grep -oP 'New items: \K\d+'     | head -1 || echo "0")
          DELETED=$(echo "$OUTPUT" | grep -oP 'Deleted items: \K\d+' | head -1 || echo "0")
          PASSED=$(echo "$OUTPUT"  | grep -oP 'Passed items: \K\d+'  | head -1 || echo "0")
          REPORT_URL=$(echo "$OUTPUT" | grep -oP 'Report URL: \K\S+' | head -1 || echo "")
          CHANGED=${CHANGED:-0}; NEW=${NEW:-0}; DELETED=${DELETED:-0}; PASSED=${PASSED:-0}

          TITLE="pass ${PASSED}"
          [ "$NEW"     != "0" ] && TITLE="${TITLE}, new ${NEW}"
          [ "$DELETED" != "0" ] && TITLE="${TITLE}, delete ${DELETED}"
          [ "$CHANGED" != "0" ] && TITLE="${TITLE}, changed ${CHANGED}"

          if [ "$CHANGED" != "0" ] || [ "$NEW" != "0" ] || [ "$DELETED" != "0" ]; then
            CONCLUSION="neutral"
          else
            CONCLUSION="success"
          fi

          SUMMARY=""
          [ -n "$REPORT_URL" ] && SUMMARY="[レポートを開く](${REPORT_URL})"
          jq -n \
            --arg sha "$CHECK_SHA" --arg conclusion "$CONCLUSION" \
            --arg title "$TITLE"   --arg summary "$SUMMARY" \
            '{name:"VRT",head_sha:$sha,status:"completed",
              conclusion:$conclusion,output:{title:$title,summary:$summary}}' \
            | gh api "repos/${CHECK_REPO}/check-runs" --method POST --input -

      - name: Format VRT report line
        id: format_vrt
        if: always()
        run: |
          OUTPUT=$(cat /tmp/reg-suit-output.txt 2>/dev/null || echo "")
          CHANGED=$(echo "$OUTPUT" | grep -oP 'Changed items: \K\d+' | head -1 || echo "0")
          NEW=$(echo "$OUTPUT"     | grep -oP 'New items: \K\d+'     | head -1 || echo "0")
          DELETED=$(echo "$OUTPUT" | grep -oP 'Deleted items: \K\d+' | head -1 || echo "0")
          PASSED=$(echo "$OUTPUT"  | grep -oP 'Passed items: \K\d+'  | head -1 || echo "0")
          REPORT_URL=$(echo "$OUTPUT" | grep -oP 'Report URL: \K\S+' | head -1 || echo "")
          CHANGED=${CHANGED:-0}; NEW=${NEW:-0}; DELETED=${DELETED:-0}; PASSED=${PASSED:-0}

          COUNTS="${PASSED} pass"
          [ "$CHANGED" != "0" ] && COUNTS="${COUNTS}, ${CHANGED} changed"
          [ "$NEW"     != "0" ] && COUNTS="${COUNTS}, ${NEW} new"
          [ "$DELETED" != "0" ] && COUNTS="${COUNTS}, ${DELETED} deleted"

          if [ "$CHANGED" != "0" ] || [ "$NEW" != "0" ] || [ "$DELETED" != "0" ]; then
            ICON="⚠️"
          else
            ICON="✅"
          fi

          echo "vrt_icon=${ICON}"      >> $GITHUB_OUTPUT
          echo "vrt_counts=${COUNTS}"  >> $GITHUB_OUTPUT
          echo "vrt_url=${REPORT_URL}" >> $GITHUB_OUTPUT

      - name: Upload VRT report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-report
          path: frontend/.reg/
          retention-days: 30

  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    needs: [lint_and_check, frontend_check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      - name: Install & build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_FIREBASE_API_KEY:     ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:  ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID:      ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL:         ${{ vars.VITE_API_BASE_URL }}

      - name: Install & build functions
        run: |
          cd functions
          npm ci
          npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: deploy
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AKANMI_NEWS_BUTLER }}
          projectId: akanmi-news-butler

      - name: Deploy Functions to Firebase
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AKANMI_NEWS_BUTLER }}
        run: |
          echo "$FIREBASE_SA" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            npx firebase-tools deploy --only functions,firestore:indexes \
            --project akanmi-news-butler --non-interactive --force

      - name: Register preview domain to Firebase Auth
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AKANMI_NEWS_BUTLER }}
          PREVIEW_URL: ${{ steps.deploy.outputs.details_url }}
        run: |
          PREVIEW_HOST=$(echo "$PREVIEW_URL" | sed 's|https://||' | sed 's|/.*||')
          echo "$FIREBASE_SA" > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json --quiet
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          CURRENT=$(curl -sf \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/akanmi-news-butler/config" \
            | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin).get('authorizedDomains', [])))")
          NEW_DOMAINS=$(CURRENT="$CURRENT" PREVIEW_HOST="$PREVIEW_HOST" python3 -c "
          import json, os
          domains = json.loads(os.environ['CURRENT'])
          host = os.environ['PREVIEW_HOST']
          if host not in domains:
              domains.append(host)
          print(json.dumps(domains))
          ")
          curl -sf -X PATCH \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"authorizedDomains\": $NEW_DOMAINS}" \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/akanmi-news-butler/config?updateMask=authorizedDomains"
          echo "Registered: $PREVIEW_HOST"

  unregister_preview_domain:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview domain from Firebase Auth
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AKANMI_NEWS_BUTLER }}
          PR_NUMBER:   ${{ github.event.pull_request.number }}
        run: |
          echo "$FIREBASE_SA" > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json --quiet
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          CURRENT=$(curl -sf \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/akanmi-news-butler/config" \
            | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin).get('authorizedDomains', [])))")
          NEW_DOMAINS=$(CURRENT="$CURRENT" PR_NUMBER="$PR_NUMBER" python3 -c "
          import json, os, re
          domains = json.loads(os.environ['CURRENT'])
          pattern = re.compile(r'akanmi-news-butler--pr' + os.environ['PR_NUMBER'] + r'-.*\.web\.app')
          domains = [d for d in domains if not pattern.match(d)]
          print(json.dumps(domains))
          ")
          curl -sf -X PATCH \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"authorizedDomains\": $NEW_DOMAINS}" \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/akanmi-news-butler/config?updateMask=authorizedDomains"
          echo "Removed preview domains for PR #$PR_NUMBER"

  report_comment:
    needs: [lint_and_check, frontend_check, visual_regression]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Post consolidated CI report comment
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:   ${{ github.event.pull_request.number }}
          REPO:        ${{ github.repository }}
          FN_UT_ICON:  ${{ needs.lint_and_check.outputs.fn_ut_icon }}
          FN_UT_URL:   ${{ needs.lint_and_check.outputs.fn_ut_url }}
          FN_COV_ICON: ${{ needs.lint_and_check.outputs.fn_cov_icon }}
          FN_COV_URL:  ${{ needs.lint_and_check.outputs.fn_cov_url }}
          FE_UT_ICON:  ${{ needs.frontend_check.outputs.fe_ut_icon }}
          FE_UT_URL:   ${{ needs.frontend_check.outputs.fe_ut_url }}
          FE_COV_ICON: ${{ needs.frontend_check.outputs.fe_cov_icon }}
          FE_COV_URL:  ${{ needs.frontend_check.outputs.fe_cov_url }}
          VRT_ICON:    ${{ needs.visual_regression.outputs.vrt_icon }}
          VRT_URL:     ${{ needs.visual_regression.outputs.vrt_url }}
          E2E_ICON:    ${{ needs.visual_regression.outputs.e2e_icon }}
          E2E_COUNTS:  ${{ needs.visual_regression.outputs.e2e_counts }}
          E2E_URL:     ${{ needs.visual_regression.outputs.e2e_url }}
        run: |
          label() { if [ "$1" = "✅" ]; then echo "✅ 成功"; elif [ "$1" = "⚠️" ]; then echo "⚠️ 新規"; else echo "❌ 失敗"; fi; }
          link()  { [ -n "$1" ] && echo "[レポート]($1)" || echo "—"; }
          FMT='<!-- ci-report -->\n| | 結果 | レポート |\n|---|---|---|\n'
          FMT+='| ⚙️ Functions UT       | %s | %s |\n'
          FMT+='| 📊 Functions Coverage | %s | %s |\n'
          FMT+='| 🧪 Frontend UT        | %s | %s |\n'
          FMT+='| 📊 Frontend Coverage  | %s | %s |\n'
          FMT+='| 🖼️ VRT                | %s | %s |\n'
          FMT+='| 🎭 E2E                | %s | %s |'
          BODY=$(printf "$FMT" \
            "$(label "$FN_UT_ICON")"  "$(link "$FN_UT_URL")" \
            "$(label "$FN_COV_ICON")" "$(link "$FN_COV_URL")" \
            "$(label "$FE_UT_ICON")"  "$(link "$FE_UT_URL")" \
            "$(label "$FE_COV_ICON")" "$(link "$FE_COV_URL")" \
            "$(label "$VRT_ICON")"    "$(link "$VRT_URL")" \
            "${E2E_ICON:-❌} ${E2E_COUNTS:-—}" "$(link "$E2E_URL")")

          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("<!-- ci-report -->")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
              --method PATCH --field body="$BODY"
          else
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --method POST --field body="$BODY"
          fi
