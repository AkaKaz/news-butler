name: Deploy to Firebase Hosting on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  lint_and_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend type check (svelte-check)
        run: cd frontend && npm run check

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Functions lint (ESLint)
        run: cd functions && npm run lint

      - name: Functions type check (tsc)
        run: cd functions && npm run build

      - name: Functions unit tests with coverage (Jest)
        run: cd functions && npm run test:coverage 2>&1 | tee /tmp/jest-output.txt; exit ${PIPESTATUS[0]}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: functions/coverage/
          retention-days: 30

      - name: Setup GCS credentials for coverage upload
        if: always()
        env:
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY: ${{ secrets.GCS_PRIVATE_KEY }}
        run: |
          python3 -c "
          import json, os
          creds = {
            'type': 'service_account',
            'project_id': 'akanmi-news-butler-ci',
            'client_email': os.environ['GCS_CLIENT_EMAIL'],
            'private_key': os.environ['GCS_PRIVATE_KEY'].replace('\\\\n', '\\n'),
            'token_uri': 'https://oauth2.googleapis.com/token'
          }
          with open('/tmp/gcs-key.json', 'w') as f:
            json.dump(creds, f)
          "
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-key.json" >> $GITHUB_ENV
          gcloud auth activate-service-account \
            --key-file=/tmp/gcs-key.json

      - name: Upload coverage report to GCS
        if: always()
        run: |
          BUCKET="akanmi-news-butler-ci.firebasestorage.app"
          SHA="${{ github.sha }}"
          gsutil cp functions/reports/coverage.html \
            "gs://${BUCKET}/coverage/${SHA}.html"

      - name: Post coverage to PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUCKET="akanmi-news-butler-ci.firebasestorage.app"
          SHA="${{ github.sha }}"
          URL="https://storage.googleapis.com/${BUCKET}/coverage/${SHA}.html"

          OUTPUT=$(cat /tmp/jest-output.txt 2>/dev/null || echo "")

          extract() {
            echo "$OUTPUT" | grep "^$1" | grep -oP '\d+\.\d+(?=%)' | head -1
          }
          STMTS=$(extract "All files")
          BRANCH=$(echo "$OUTPUT" | awk '/^All files/{print $3}' | grep -oP '\d+\.\d+' | head -1)
          FUNCS=$(echo "$OUTPUT" | awk '/^All files/{print $4}' | grep -oP '\d+\.\d+' | head -1)
          LINES=$(echo "$OUTPUT" | awk '/^All files/{print $5}' | grep -oP '\d+\.\d+' | head -1)

          {
            printf "## 📊 Coverage Report\n\n"
            printf "| カテゴリ | カバレッジ |\n"
            printf "|---|---:|\n"
            printf "| Statements | %s%% |\n" "${STMTS}"
            printf "| Branches   | %s%% |\n" "${BRANCH}"
            printf "| Functions  | %s%% |\n" "${FUNCS}"
            printf "| Lines      | %s%% |\n" "${LINES}"
            printf "\n[詳細レポートを開く](%s)\n" "${URL}"
          } > /tmp/coverage-comment.md

          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/coverage-comment.md --edit-last || \
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/coverage-comment.md

          cat /tmp/coverage-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Test report (JUnit)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Functions Tests
          path: functions/reports/junit.xml
          reporter: jest-junit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Functions test results to PR
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: functions/reports/junit.xml
          comment_title: Functions Test Results

  visual_regression:
    runs-on: ubuntu-latest
    needs: lint_and_check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_APP_ID: dummy
          VITE_API_BASE_URL: http://localhost:3000

      - name: Run Playwright (capture screenshots)
        run: cd frontend && npm run test:visual

      - name: Setup GCS credentials
        env:
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY: ${{ secrets.GCS_PRIVATE_KEY }}
        run: |
          python3 -c "
          import json, os
          creds = {
            'type': 'service_account',
            'project_id': 'akanmi-news-butler-ci',
            'client_email': os.environ['GCS_CLIENT_EMAIL'],
            'private_key': os.environ['GCS_PRIVATE_KEY'].replace('\\\\n', '\\n'),
            'token_uri': 'https://oauth2.googleapis.com/token'
          }
          with open('/tmp/gcs-key.json', 'w') as f:
            json.dump(creds, f)
          "
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-key.json" >> $GITHUB_ENV

      - name: Run reg-suit (compare & publish)
        run: cd frontend && npx reg-suit run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    needs: lint_and_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      - name: Install & build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install & build functions
        run: |
          cd functions
          npm ci
          npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AKANMI_NEWS_BUTLER }}
          projectId: akanmi-news-butler
