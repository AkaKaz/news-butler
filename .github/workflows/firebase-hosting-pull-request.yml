name: Deploy to Firebase Hosting on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  lint_and_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend type check (svelte-check)
        run: cd frontend && npm run check

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Functions lint (ESLint)
        run: cd functions && npm run lint

      - name: Functions type check (tsc)
        run: cd functions && npm run build

      - name: Functions unit tests with coverage (Jest)
        run: cd functions && npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: functions/coverage/
          retention-days: 30

      - name: Test report (JUnit)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Functions Tests
          path: functions/reports/junit.xml
          reporter: jest-junit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Functions test results to PR
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: functions/reports/junit.xml
          comment_title: Functions Test Results

  visual_regression:
    runs-on: ubuntu-latest
    needs: lint_and_check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_APP_ID: dummy
          VITE_API_BASE_URL: http://localhost:3000

      - name: Run visual regression tests
        run: cd frontend && npm run test:visual

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Test report (JUnit)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Visual Regression Tests
          path: frontend/reports/junit.xml
          reporter: jest-junit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post VRT results to PR
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: frontend/reports/junit.xml
          comment_title: Visual Regression Test Results

  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    needs: lint_and_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      - name: Install & build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install & build functions
        run: |
          cd functions
          npm ci
          npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AKANMI_NEWS_BUTLER }}
          projectId: akanmi-news-butler
