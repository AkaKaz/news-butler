name: Deploy to Firebase Hosting on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  lint_and_check:
    runs-on: ubuntu-latest
    outputs:
      tests_icon: ${{ steps.format_lines.outputs.tests_icon }}
      tests_counts: ${{ steps.format_lines.outputs.tests_counts }}
      cov_icon: ${{ steps.format_lines.outputs.cov_icon }}
      cov_percent: ${{ steps.format_lines.outputs.cov_percent }}
      cov_url: ${{ steps.format_lines.outputs.cov_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend type check (svelte-check)
        run: cd frontend && npm run check

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Functions lint (ESLint)
        run: cd functions && npm run lint

      - name: Functions type check (tsc)
        run: cd functions && npm run build

      - name: Functions unit tests with coverage (Jest)
        run: cd functions && npm run test:coverage 2>&1 | tee /tmp/jest-output.txt; exit ${PIPESTATUS[0]}

      - name: Setup GCS credentials for coverage upload
        if: always()
        env:
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY: ${{ secrets.GCS_PRIVATE_KEY }}
        run: |
          python3 -c "
          import json, os
          creds = {
            'type': 'service_account',
            'project_id': 'akanmi-news-butler-ci',
            'client_email': os.environ['GCS_CLIENT_EMAIL'],
            'private_key': os.environ['GCS_PRIVATE_KEY'].replace('\\\\n', '\\n'),
            'token_uri': 'https://oauth2.googleapis.com/token'
          }
          with open('/tmp/gcs-key.json', 'w') as f:
            json.dump(creds, f)
          "
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-key.json" >> $GITHUB_ENV
          gcloud auth activate-service-account \
            --key-file=/tmp/gcs-key.json

      - name: Upload coverage report to GCS
        if: always()
        run: |
          BUCKET="akanmi-news-butler-ci"
          SHA="${{ github.sha }}"
          gsutil cp functions/reports/coverage.html \
            "gs://${BUCKET}/coverage/${SHA}.html"

      - name: Create coverage check
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHECK_REPO: ${{ github.repository }}
          CHECK_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/jest-output.txt 2>/dev/null || echo "")
          LINES=$(echo "$OUTPUT" | awk -F'|' '/^All files/{gsub(/ /,"",$5); print $5}' \
            | grep -oP '\d+\.?\d*' | head -1)
          URL="https://storage.googleapis.com/akanmi-news-butler-ci/coverage/${CHECK_SHA}.html"

          if [ -n "$LINES" ]; then
            export TITLE="${LINES}% lines" CONCLUSION="success"
          else
            export TITLE="failed" CONCLUSION="failure"
          fi
          jq -n \
            --arg sha "$CHECK_SHA" \
            --arg conclusion "$CONCLUSION" \
            --arg title "$TITLE" \
            --arg summary "[Ť©≥Áīį„É¨„ÉĚ„Éľ„Éą„āíťĖč„ĀŹ](${URL})" \
            '{name:"Coverage",head_sha:$sha,status:"completed",
              conclusion:$conclusion,output:{title:$title,summary:$summary}}' \
            > /tmp/check.json
          gh api "repos/${CHECK_REPO}/check-runs" \
            --method POST --input /tmp/check.json

      - name: Create Unit Tests check
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHECK_REPO: ${{ github.repository }}
          CHECK_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/jest-output.txt 2>/dev/null || echo "")
          PASSED=$(echo "$OUTPUT" | grep -P '^Tests:' | grep -oP '\d+ passed' | grep -oP '^\d+' || echo "")
          TOTAL=$(echo "$OUTPUT" | grep -P '^Tests:' | grep -oP '\d+ total' | grep -oP '^\d+' || echo "")
          URL="https://storage.googleapis.com/akanmi-news-butler-ci/coverage/${CHECK_SHA}.html"

          if [ -n "$PASSED" ] && [ -n "$TOTAL" ]; then
            TITLE="${PASSED}/${TOTAL}"
            [ "$PASSED" = "$TOTAL" ] && CONCLUSION="success" || CONCLUSION="failure"
          else
            TITLE="failed"
            CONCLUSION="failure"
          fi

          jq -n \
            --arg sha "$CHECK_SHA" \
            --arg conclusion "$CONCLUSION" \
            --arg title "$TITLE" \
            --arg summary "[„ÉÜ„āĻ„Éą„É¨„ÉĚ„Éľ„Éą„āíťĖč„ĀŹ](${URL})" \
            '{name:"Unit Tests",head_sha:$sha,status:"completed",
              conclusion:$conclusion,output:{title:$title,summary:$summary}}' \
            > /tmp/check.json
          gh api "repos/${CHECK_REPO}/check-runs" \
            --method POST --input /tmp/check.json

      - name: Format report lines
        id: format_lines
        if: always()
        env:
          CHECK_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/jest-output.txt 2>/dev/null || echo "")
          PASSED=$(echo "$OUTPUT" | grep -P '^Tests:' | grep -oP '\d+ passed' | grep -oP '^\d+' || echo "?")
          TOTAL=$(echo "$OUTPUT" | grep -P '^Tests:' | grep -oP '\d+ total' | grep -oP '^\d+' || echo "?")
          LINES=$(echo "$OUTPUT" | awk -F'|' '/^All files/{gsub(/ /,"",$5); print $5}' \
            | grep -oP '\d+\.?\d*' | head -1 || echo "?")
          COV_URL="https://storage.googleapis.com/akanmi-news-butler-ci/coverage/${CHECK_SHA}.html"

          [ "$PASSED" = "$TOTAL" ] && T_ICON="‚úÖ" || T_ICON="‚ĚĆ"
          [ "$LINES" != "?" ] && C_ICON="‚úÖ" || C_ICON="‚ĚĆ"

          echo "tests_icon=${T_ICON}" >> $GITHUB_OUTPUT
          echo "tests_counts=${PASSED}/${TOTAL}" >> $GITHUB_OUTPUT
          echo "cov_icon=${C_ICON}" >> $GITHUB_OUTPUT
          echo "cov_percent=${LINES}" >> $GITHUB_OUTPUT
          echo "cov_url=${COV_URL}" >> $GITHUB_OUTPUT

  visual_regression:
    runs-on: ubuntu-latest
    needs: lint_and_check
    outputs:
      vrt_icon: ${{ steps.format_vrt.outputs.vrt_icon }}
      vrt_counts: ${{ steps.format_vrt.outputs.vrt_counts }}
      vrt_url: ${{ steps.format_vrt.outputs.vrt_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_APP_ID: dummy
          VITE_API_BASE_URL: http://localhost:3000

      - name: Run Playwright (capture screenshots)
        run: cd frontend && npm run test:visual

      - name: Setup GCS credentials
        env:
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY: ${{ secrets.GCS_PRIVATE_KEY }}
        run: |
          python3 -c "
          import json, os
          creds = {
            'type': 'service_account',
            'project_id': 'akanmi-news-butler-ci',
            'client_email': os.environ['GCS_CLIENT_EMAIL'],
            'private_key': os.environ['GCS_PRIVATE_KEY'].replace('\\\\n', '\\n'),
            'token_uri': 'https://oauth2.googleapis.com/token'
          }
          with open('/tmp/gcs-key.json', 'w') as f:
            json.dump(creds, f)
          "
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-key.json" >> $GITHUB_ENV

      - name: Run reg-suit (compare & publish)
        run: |
          cd frontend
          npx reg-suit run 2>&1 | tee /tmp/reg-suit-output.txt
          exit ${PIPESTATUS[0]}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create VRT check
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHECK_REPO: ${{ github.repository }}
          CHECK_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(cat /tmp/reg-suit-output.txt 2>/dev/null || echo "")
          CHANGED=$(echo "$OUTPUT" | grep -oP 'Changed items: \K\d+' | head -1 || echo "0")
          NEW=$(echo "$OUTPUT" | grep -oP 'New items: \K\d+' | head -1 || echo "0")
          DELETED=$(echo "$OUTPUT" | grep -oP 'Deleted items: \K\d+' | head -1 || echo "0")
          PASSED=$(echo "$OUTPUT" | grep -oP 'Passed items: \K\d+' | head -1 || echo "0")
          REPORT_URL=$(echo "$OUTPUT" | grep -oP 'Report URL: \K\S+' | head -1 || echo "")
          CHANGED=${CHANGED:-0}; NEW=${NEW:-0}; DELETED=${DELETED:-0}; PASSED=${PASSED:-0}

          TITLE="pass ${PASSED}"
          [ "$NEW" != "0" ]     && TITLE="${TITLE}, new ${NEW}"
          [ "$DELETED" != "0" ] && TITLE="${TITLE}, delete ${DELETED}"
          [ "$CHANGED" != "0" ] && TITLE="${TITLE}, changed ${CHANGED}"

          if [ "$CHANGED" != "0" ]; then
            CONCLUSION="failure"
          elif [ "$NEW" != "0" ] || [ "$DELETED" != "0" ]; then
            CONCLUSION="neutral"
          else
            CONCLUSION="success"
          fi

          SUMMARY=""
          [ -n "$REPORT_URL" ] && SUMMARY="[„É¨„ÉĚ„Éľ„Éą„āíťĖč„ĀŹ](${REPORT_URL})"
          jq -n \
            --arg sha "$CHECK_SHA" \
            --arg conclusion "$CONCLUSION" \
            --arg title "$TITLE" \
            --arg summary "$SUMMARY" \
            '{name:"VRT",head_sha:$sha,status:"completed",
              conclusion:$conclusion,output:{title:$title,summary:$summary}}' \
            > /tmp/check.json
          gh api "repos/${CHECK_REPO}/check-runs" \
            --method POST --input /tmp/check.json

      - name: Format VRT report line
        id: format_vrt
        if: always()
        run: |
          OUTPUT=$(cat /tmp/reg-suit-output.txt 2>/dev/null || echo "")
          CHANGED=$(echo "$OUTPUT" | grep -oP 'Changed items: \K\d+' | head -1 || echo "0")
          NEW=$(echo "$OUTPUT" | grep -oP 'New items: \K\d+' | head -1 || echo "0")
          DELETED=$(echo "$OUTPUT" | grep -oP 'Deleted items: \K\d+' | head -1 || echo "0")
          PASSED=$(echo "$OUTPUT" | grep -oP 'Passed items: \K\d+' | head -1 || echo "0")
          REPORT_URL=$(echo "$OUTPUT" | grep -oP 'Report URL: \K\S+' | head -1 || echo "")
          CHANGED=${CHANGED:-0}; NEW=${NEW:-0}; DELETED=${DELETED:-0}; PASSED=${PASSED:-0}

          COUNTS="${PASSED} pass"
          [ "$CHANGED" != "0" ] && COUNTS="${COUNTS}, ${CHANGED} changed"
          [ "$NEW" != "0" ]     && COUNTS="${COUNTS}, ${NEW} new"
          [ "$DELETED" != "0" ] && COUNTS="${COUNTS}, ${DELETED} deleted"

          if [ "$CHANGED" != "0" ]; then
            ICON="‚ĚĆ"
          elif [ "$NEW" != "0" ] || [ "$DELETED" != "0" ]; then
            ICON="‚ö†ÔłŹ"
          else
            ICON="‚úÖ"
          fi

          echo "vrt_icon=${ICON}" >> $GITHUB_OUTPUT
          echo "vrt_counts=${COUNTS}" >> $GITHUB_OUTPUT
          echo "vrt_url=${REPORT_URL}" >> $GITHUB_OUTPUT

      - name: Upload VRT report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-report
          path: frontend/.reg/
          retention-days: 30

  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    needs: lint_and_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      - name: Install & build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install & build functions
        run: |
          cd functions
          npm ci
          npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AKANMI_NEWS_BUTLER }}
          projectId: akanmi-news-butler

  report_comment:
    needs: [lint_and_check, visual_regression]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Post consolidated CI report comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TESTS_ICON: ${{ needs.lint_and_check.outputs.tests_icon }}
          COV_ICON: ${{ needs.lint_and_check.outputs.cov_icon }}
          VRT_ICON: ${{ needs.visual_regression.outputs.vrt_icon }}
        run: |
          label() { [ "$1" = "‚úÖ" ] && echo "‚úÖ śąźŚäü" || echo "‚ĚĆ Ś§Īśēó"; }
          FMT='<!-- ci-report -->\n| | ÁĶźśěú |\n|---|---|\n'
          FMT+='| ūüß™ Unit Tests | %s |\n'
          FMT+='| ūüďä Coverage | %s |\n'
          FMT+='| ūüĖľÔłŹ VRT | %s |'
          BODY=$(printf "$FMT" \
            "$(label "$TESTS_ICON")" \
            "$(label "$COV_ICON")" \
            "$(label "$VRT_ICON")")

          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("<!-- ci-report -->")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
              --method PATCH --field body="$BODY"
          else
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --method POST --field body="$BODY"
          fi
