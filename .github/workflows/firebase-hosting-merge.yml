name: Deploy to Firebase on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      - name: Install & build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Install & build functions
        run: |
          cd functions
          npm ci
          npm run build

      - name: Functions unit tests with coverage (Jest)
        run: cd functions && npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: functions/coverage/
          retention-days: 30

      - name: Setup GCS credentials for coverage upload
        if: always()
        env:
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY: ${{ secrets.GCS_PRIVATE_KEY }}
        run: |
          python3 -c "
          import json, os
          creds = {
            'type': 'service_account',
            'project_id': 'akanmi-news-butler-ci',
            'client_email': os.environ['GCS_CLIENT_EMAIL'],
            'private_key': os.environ['GCS_PRIVATE_KEY'].replace('\\\\n', '\\n'),
            'token_uri': 'https://oauth2.googleapis.com/token'
          }
          with open('/tmp/gcs-key.json', 'w') as f:
            json.dump(creds, f)
          "
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-key.json" >> $GITHUB_ENV
          gcloud auth activate-service-account \
            --key-file=/tmp/gcs-key.json

      - name: Upload coverage report to GCS
        if: always()
        run: |
          BUCKET="akanmi-news-butler-ci"
          SHA="${{ github.sha }}"
          gsutil cp functions/coverage/index.html \
            "gs://${BUCKET}/coverage/${SHA}.html"

      - name: Deploy Firestore Rules
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AKANMI_NEWS_BUTLER }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          echo "$FIREBASE_SA" > /tmp/firebase-sa.json
          npx firebase-tools deploy --only firestore:rules \
            --project akanmi-news-butler --non-interactive

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AKANMI_NEWS_BUTLER }}
          channelId: live
          projectId: akanmi-news-butler

  update_visual_baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium webkit --with-deps

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_APP_ID: dummy
          VITE_API_BASE_URL: http://localhost:3000
          VITE_VRT_AUTH_BYPASS: true

      - name: Run Playwright (capture screenshots)
        run: cd frontend && npm run test:visual

      - name: Setup GCS credentials
        env:
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_PRIVATE_KEY: ${{ secrets.GCS_PRIVATE_KEY }}
        run: |
          python3 -c "
          import json, os
          creds = {
            'type': 'service_account',
            'project_id': 'akanmi-news-butler-ci',
            'client_email': os.environ['GCS_CLIENT_EMAIL'],
            'private_key': os.environ['GCS_PRIVATE_KEY'].replace('\\\\n', '\\n'),
            'token_uri': 'https://oauth2.googleapis.com/token'
          }
          with open('/tmp/gcs-key.json', 'w') as f:
            json.dump(creds, f)
          "
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-key.json" >> $GITHUB_ENV
          gcloud auth activate-service-account \
            --key-file=/tmp/gcs-key.json

      - name: Run reg-suit (publish baseline to GCS)
        run: |
          cd frontend
          npx reg-suit run 2>&1 | tee /tmp/reg-suit-output.txt
          exit ${PIPESTATUS[0]}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete previous main reports
        run: |
          BUCKET="akanmi-news-butler-ci"
          PREV_SHA="${{ github.event.before }}"
          NULL_SHA="0000000000000000000000000000000000000000"

          if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "$NULL_SHA" ]; then
            echo "No previous SHA, skipping."
            exit 0
          fi

          echo "Deleting previous main reports: ${PREV_SHA}"
          gsutil -m rm -r \
            "gs://${BUCKET}/vrt/${PREV_SHA}/" 2>/dev/null || true
          gsutil rm \
            "gs://${BUCKET}/coverage/${PREV_SHA}.html" 2>/dev/null || true

